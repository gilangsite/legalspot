<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Legalspot</title>
    <link rel="icon" type="image/png" href="/assets/images/legalspot-logo.png" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <style>
        body {
            background-color: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--black-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), var(--shadow-navy);
        }

        .login-card h1 {
            color: var(--white);
            font-size: var(--fs-2xl);
            font-weight: 600;
            margin-bottom: var(--space-xs);
        }

        .login-card p {
            color: var(--gray-mid);
            font-size: var(--fs-sm);
            margin-bottom: var(--space-xl);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--gray-light);
            font-size: var(--fs-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--black-soft);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: var(--radius-sm);
            color: var(--white);
            outline: none;
            width: 100%;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--navy-bright);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .error-msg {
            color: #f87171;
            font-size: var(--fs-xs);
            margin-top: 1rem;
            display: none;
            background: rgba(248, 113, 113, 0.1);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h1>Admin Panel</h1>
        <p>Login ke Dashboard Legalspot</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Akses</label>
                <input type="email" id="email" class="form-control" placeholder="admin@legalspot.id" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg"
                style="width:100%; justify-content:center; margin-top:1rem;">Masuk</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const mail = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            // Simulate Auth call
            setTimeout(() => {
                if (mail === 'admin@legalspot.id' && pass === 'BismillahCuan2026') {
                    // Success
                    localStorage.setItem('adminAuth', 'true');
                    localStorage.setItem('adminRole', 'Super Visior');
                    window.location.href = 'dashboard.html';
                } else {
                    // Failed
                    errorMsg.innerText = 'Kredensial salah. Email atau Password tidak sesuai.';
                    errorMsg.style.display = 'block';
                    btn.innerHTML = 'Masuk';
                    btn.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>

</html>
